services:

  laravel_app:
    build: .
    container_name: laravel_container
    restart: unless-stopped
    ports:
      - "8000:4000"
    depends_on:
      - mysql_db
    volumes:
      - ./backend:/var/www/

  mysql_db:
    image: mysql
    container_name: db_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  

volumes:
  db_data:
